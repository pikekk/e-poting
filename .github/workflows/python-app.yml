name: Python application test

# Menjalankan otomatis saat ada aktivitas di branch main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # Tambahan 1: Memastikan dependensi (jika ada) terinstall
    # Walaupun sekarang belum pakai library luar, ini standar yang baik
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip

    # Tambahan 2: Menjalankan test dengan format output yang kamu inginkan
    # Menggunakan python langsung ke file agar print() kita terlihat rapi
    - name: Run Tests
      run: |
        python tests/test_evoting.py