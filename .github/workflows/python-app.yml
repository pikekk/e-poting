name: Python application test

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    # Menambahkan environment variable untuk Node.js 24 sesuai saran log
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Run Tests
      run: |
        # Menggunakan -m unittest agar Python otomatis mengenali path folder app
        python3 -m unittest tests/test_evoting.py